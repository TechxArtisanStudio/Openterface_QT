name: Build / Openterface Windows Installer

on:
  push:
    branches: ["main", "dev_1223_portable_build"]
    tags: ["v*"]
    paths:
      - '.github/workflows/windows-build.yaml'
      - 'vcpkg.json'
      - 'CMakeLists.txt'
      - '**/*.bat'
      - '**/*.cpp'
  pull_request:
    branches: ["dev"]
    paths:
      - '.github/workflows/windows-build.yaml'
      - 'vcpkg.json'
      - 'CMakeLists.txt'
      - '**/*.bat'
      - '**/*.cpp'
  workflow_dispatch:
    inputs:
      increase_version:
        description: 'Increase the patch version number'
        required: false
        type: boolean
        default: false
      increase_minor:
        description: 'Increase the minor version number'
        required: false
        type: boolean
        default: false
      increase_major:
        description: 'Increase the major version number'
        required: false
        type: boolean
        default: false

defaults:
  run:
    shell: cmd

env:
  SOURCE_DIR: ${{ github.workspace }}
  QT_VERSION: 6.6.3
  FFMPEG_VERSION: 6.1.1
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  QT_CACHE_KEY: qt-6.6.3-mingw-windows
  JOM_CACHE_KEY: jom-1.1.3-windows
  PACKAGE_DIR: "package_online"
  EXE_NAME: "openterfaceQT.exe"
  # GPU-related build flags that influence ffmpeg configuration
  ENABLE_NVENC: 1
  ENABLE_NVDEC: 1
  AUTO_INSTALL_FFNV: 1
  ENABLE_LIBMFX: 1

permissions:
  contents: write
  actions: write

jobs:
  build:
    runs-on: windows-2022
    environment: ${{ github.event.inputs.TARGET_ENV || 'Openterface_build' }}
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup MSYS2 MinGW64 environment
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: |
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-nasm
            mingw-w64-x86_64-make
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-zlib
            mingw-w64-x86_64-bzip2
            mingw-w64-x86_64-xz
            mingw-w64-x86_64-libjpeg-turbo
            mingw-w64-x86_64-libiconv
            mingw-w64-x86_64-libmfx
            mingw-w64-x86_64-ffnvcodec-headers 
            mingw-w64-x86_64-libusb
            diffutils
            make
            libtool
            git
            perl

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Update version
        run: |
          if [ "${{ github.event.inputs.increase_version }}" = "true" ]; then
            python "${{ env.SOURCE_DIR }}/build-script/update_version.py" --increase-version
          elif [ "${{ github.event.inputs.increase_major }}" = "true" ]; then
            python "${{ env.SOURCE_DIR }}/build-script/update_version.py" --increase-major
          elif [ "${{ github.event.inputs.increase_minor }}" = "true" ]; then
            python "${{ env.SOURCE_DIR }}/build-script/update_version.py" --increase-minor
          else
            python "${{ env.SOURCE_DIR }}/build-script/update_version.py"
          fi
        shell: bash

      - name: Commit and push version bump
        if: ${{ github.event.inputs.increase_version == 'true' || github.event.inputs.increase_minor == 'true' || github.event.inputs.increase_major == 'true' }}
        shell: bash
        run: |
          echo "Committing updated version.h and creating tag v$GIT_TAG_VERSION"
          git status --porcelain
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add resources/version.h
          git commit -m "Bump version to $GIT_TAG_VERSION" || echo "No changes to commit"
          # Create annotated tag if it doesn't already exist
          if ! git rev-parse "refs/tags/v$GIT_TAG_VERSION" >/dev/null 2>&1; then
            git tag -a "v$GIT_TAG_VERSION" -m "Release $GIT_TAG_VERSION"
          else
            echo "Tag v$GIT_TAG_VERSION already exists, skipping tag creation"
          fi
          # Push branch and tags back to origin
          git push origin "HEAD:${{ github.ref_name }}" --follow-tags || echo "Push failed; check permissions or branch protection"

      - name: Dispatch Linux build (on patch increment)
        if: ${{ github.event.inputs.increase_version == 'true' }}
        shell: bash
        run: |
          echo "Dispatching linux-build.yml workflow via REST API"
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/linux-build.yaml/dispatches \
            -d "{\"ref\":\"${{ github.ref_name }}\",\"inputs\":{\"build_type\":\"both\",\"ubuntu_version\":\"22.04\"}}"

      - name: Dispatch Windows Portable build (on patch increment)
        if: ${{ github.event.inputs.increase_version == 'true' }}
        shell: bash
        run: |
          echo "Dispatching windows-portable-build.yaml workflow via REST API"
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/windows-portable-build.yaml/dispatches \
            -d "{\"ref\":\"${{ github.ref_name }}\"}"

      - name: Get all tags for correct version determination
        working-directory: ${{ github.workspace }}
        run: |
          git fetch --all --tags -f

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: windows
          target: desktop
          arch: win64_mingw
          dir: ${{ runner.temp }}
          modules: qtmultimedia qtserialport qtimageformats
          setup-python: false

      - name: Cache FFmpeg (shared)
        id: cache-ffmpeg
        uses: actions/cache@v4
        with:
          path: C:\ffmpeg-shared
          # Key encodes all hardware flags so ANY change forces a full rebuild.
          # restore-keys is intentionally omitted: a partial key match would restore an
          # old FFmpeg built without libmfx/QSV support, causing mjpeg_qsv to be missing
          # at runtime even though ENABLE_LIBMFX=1 is set.
          key: ffmpeg-shared-${{ env.FFMPEG_VERSION }}-windows-v2-${{ runner.os }}-nvenc${{ env.ENABLE_NVENC || '0' }}-nvdec${{ env.ENABLE_NVDEC || '0' }}-libmfx${{ env.ENABLE_LIBMFX || '0' }}

      - name: Check Build Scripts Available
        shell: cmd
        run: |
          echo "Checking available build scripts..."
          cd /d "${{ env.SOURCE_DIR }}"
          dir build-script\*.bat
          dir build-script\*.sh

      - name: Build Shared FFmpeg (using MSYS2 MinGW64)
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        shell: msys2 {0}
        run: |
          echo "Building shared FFmpeg using MSYS2 MinGW64..."
          export SKIP_MSYS_MINGW=1
          export EXTERNAL_MINGW_MSYS="/mingw64"
          export FFMPEG_INSTALL_PREFIX="/c/ffmpeg-shared"
          # Ensure pkg-config can find MinGW pkgconfig
          export PKG_CONFIG_PATH="/mingw64/lib/pkgconfig:$PKG_CONFIG_PATH"

          export ENABLE_NVENC=1
          # also enable decoder detection; CUDA_FLAGS in script already adds nvdec when NVENC=1
          export ENABLE_NVDEC=1

          export AUTO_INSTALL_FFNV=1

          export ENABLE_LIBMFX=1  # QSV support (build-script will enable mjpeg,qsv decoders etc.)

          cd "${{ env.SOURCE_DIR }}/build-script"
          ./build-shared-ffmpeg-windows.sh > "${{ github.workspace }}/ffmpeg_build.log" 2>&1
          EXIT_CODE=$?
          if [ $EXIT_CODE -ne 0 ]; then
            echo "ERROR: FFmpeg build failed!"
            tail -n 200 "${{ github.workspace }}/ffmpeg_build.log" || true
            exit $EXIT_CODE
          fi
          echo "FFmpeg build succeeded"

      - name: Upload FFmpeg artifact (on build)
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-shared-${{ env.FFMPEG_VERSION }}
          path: C:\ffmpeg-shared
          retention-days: 7

      - name: Verify FFmpeg installation
        shell: msys2 {0}
        run: |
          if [ -f "/c/ffmpeg-shared/bin/avcodec-60.dll" ]; then
            echo "✓ FFmpeg DLLs found"
          else
            echo "✗ FFmpeg DLLs missing"
            ls -la "/c/ffmpeg-shared/bin/" || echo "FFmpeg bin directory does not exist"
            exit 1
          fi
          if [ -f "/c/ffmpeg-shared/lib/libavcodec.dll.a" ]; then
            echo "✓ FFmpeg import libraries found"
          else
            echo "✗ FFmpeg import libraries missing"
            ls -la "/c/ffmpeg-shared/lib/" || echo "FFmpeg lib directory does not exist"
            exit 1
          fi

      - name: Verify FFmpeg hwaccel and mjpeg decoders
        shell: msys2 {0}
        run: |
          echo "=== FFmpeg hardware acceleration summary ==="
          /c/ffmpeg-shared/bin/ffmpeg -hide_banner -hwaccels || echo "ffmpeg not found or hwaccels failed"
          echo ""
          echo "=== MJPEG decoders ==="
          /c/ffmpeg-shared/bin/ffmpeg -hide_banner -decoders | grep -i mjpeg || echo "No mjpeg decoders found"
          echo ""
          echo "=== NVENC/QSV specific checks ==="
          /c/ffmpeg-shared/bin/ffmpeg -hide_banner -decoders | grep -E "(cuvid|qsv)" || echo "No NVENC/QSV decoders found"
          echo ""
          echo "=== Tail of configure log (if present) ==="
          if [ -f "${{ env.SOURCE_DIR }}/build-script/ffmpeg-build-temp/ffmpeg-configure.log" ]; then
            tail -n 200 "${{ env.SOURCE_DIR }}/build-script/ffmpeg-build-temp/ffmpeg-configure.log" || true
          else
            echo "Configure log not found"
          fi

      - name: Upload FFmpeg configure log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-configure-log
          path: ${{ env.SOURCE_DIR }}/build-script/ffmpeg-build-temp/ffmpeg-configure.log
          if-no-files-found: warn

      - name: Cache LibUSB
        id: cache-libusb
        uses: actions/cache@v4
        with:
          path: C:\libusb
          key: libusb-1.0.27-windows-v1
          restore-keys: |
            libusb-1.0.27-windows-v1

      - name: Verify and Setup LibUSB
        if: steps.cache-libusb.outputs.cache-hit != 'true' || github.event.inputs.force_rebuild == 'true'
        shell: msys2 {0}
        run: |
          echo "Setting up LibUSB for Qt/MinGW compatibility..."

          # Update package DB and ensure MinGW libusb package is installed
          echo "Updating package database and installing mingw-w64-x86_64-libusb (if needed)..."
          pacman -Sy --noconfirm --needed mingw-w64-x86_64-libusb || echo "pacman returned non-zero status"

          # List package files if installed (helps debugging)
          if pacman -Qi mingw-w64-x86_64-libusb >/dev/null 2>&1; then
            echo "Installed files for mingw-w64-x86_64-libusb:"; pacman -Ql mingw-w64-x86_64-libusb || true
          fi

          # Create cache directory structure
          mkdir -p /c/libusb/bin /c/libusb/lib /c/libusb/include

          LIBUSB_FOUND=false

          # Preferred: MinGW libusb DLL (best ABI compatibility with Qt/MinGW)
          if [ -f "/mingw64/bin/libusb-1.0.dll" ]; then
            echo "✓ Found MinGW libusb-1.0.dll"
            cp /mingw64/bin/libusb-1.0.dll /c/libusb/bin/ || true
            cp /mingw64/bin/libusb-1.0.dll /c/libusb/bin/msys-usb-1.0.dll || true
            # Copy MinGW runtime dependencies that might be needed
            cp /mingw64/bin/libwinpthread-1.dll /c/libusb/bin/ 2>/dev/null || true
            cp /mingw64/bin/libgcc_s_seh-1.dll /c/libusb/bin/ 2>/dev/null || true
            
            # Copy library and header files for linking
            cp /mingw64/lib/*usb* /c/libusb/lib/ 2>/dev/null || echo "No USB libs to copy"
            cp -r /mingw64/include/libusb* /c/libusb/include/ 2>/dev/null || echo "No USB headers to copy"
            
            LIBUSB_FOUND=true
          else
            echo "MinGW libusb-1.0.dll not found in /mingw64/bin"
          fi

          # Fallback: check cached copy or search for possible DLLs and copy them
          if [ "$LIBUSB_FOUND" = "false" ]; then
            echo "Checking cache at /c/libusb and searching the filesystem for libusb DLLs..."
            if [ -f "/c/libusb/bin/libusb-1.0.dll" ]; then
              echo "✓ Found libusb-1.0.dll in cache"
              cp /c/libusb/bin/libusb-1.0.dll /c/libusb/bin/ || true
              LIBUSB_FOUND=true
            else
              USB_DLLS=$(find / -name "libusb-1.0.dll" -o -name "msys-usb-1.0.dll" 2>/dev/null | head -5 || true)
              if [ -n "$USB_DLLS" ]; then
                echo "Found USB DLLs: $USB_DLLS"
                for dll in $USB_DLLS; do
                  echo "Copying $dll to /c/libusb/bin/"
                  cp "$dll" /c/libusb/bin/ 2>/dev/null || true
                  LIBUSB_FOUND=true
                done
              fi
            fi
          fi

          # If still missing, fail early with actionable message
          if [ "$LIBUSB_FOUND" = "false" ]; then
            echo "ERROR: libusb-1.0.dll not found after installation and search attempts."
            echo "Suggestions:"
            echo "  - Enable 'force_rebuild' input to force reinstallation in CI or run the workflow again."
            echo "  - Ensure MSYS2 pacman can access mingw-w64-x86_64-libusb (network/firewall issues may block it)."
            echo "  - As a last resort place a compatible libusb-1.0.dll in /c/libusb/bin or next to the executable."
            exit 1
          fi

          echo "Final LibUSB cache contents:"
          ls -la /c/libusb/bin/ || echo "No files in cache bin"
          echo "✓ LibUSB setup completed successfully"

      - name: Upload FFmpeg Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-build-log
          path: ${{ github.workspace }}/ffmpeg_build.log
          if-no-files-found: warn

      - name: Upload LibUSB Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: libusb-build-log
          path: ${{ github.workspace }}/libusb_build.log
          if-no-files-found: warn

      - name: Dump FFmpeg and LibUSB logs (tail)
        if: always()
        shell: pwsh
        run: |
          if (Test-Path "$env:GITHUB_WORKSPACE\ffmpeg_build.log") { Write-Host "---- FFmpeg tail (last 200 lines) ----"; Get-Content "$env:GITHUB_WORKSPACE\ffmpeg_build.log" -Tail 200 } else { Write-Host "No ffmpeg_build.log" }
          if (Test-Path "$env:GITHUB_WORKSPACE\libusb_build.log") { Write-Host "---- LibUSB tail (last 200 lines) ----"; Get-Content "$env:GITHUB_WORKSPACE\libusb_build.log" -Tail 200 } else { Write-Host "No libusb_build.log" }

      - name: Create build directory
        run: mkdir ${{ runner.temp }}\build

      - name: Build
        working-directory: ${{ runner.temp }}\build
        shell: msys2 {0}
        run: |
          echo "Setting up build environment..."
          # Convert Windows paths to MSYS2 format
          SOURCE_DIR_MSYS="/$(echo '${{ env.SOURCE_DIR }}' | sed 's|\\|/|g' | sed 's|:||')"
          QT_PATH_MSYS="/$(echo '${{ runner.temp }}/Qt/6.6.3/mingw_64/bin' | sed 's|\\|/|g' | sed 's|:||')"
          
          # Add Qt tools to PATH for MSYS2 environment
          export PATH="/mingw64/bin:${QT_PATH_MSYS}:$PATH"
          echo "Updated PATH: $PATH"
          echo "Source directory (MSYS2 format): $SOURCE_DIR_MSYS"
          
          echo "Checking Qt tools availability..."
          which lupdate || echo "lupdate not found in PATH"
          which lrelease || echo "lrelease not found in PATH"
          
          echo "Updating translations with lupdate..."
          lupdate "${SOURCE_DIR_MSYS}/openterfaceQT.pro"
          echo "Generating .qm files with lrelease..."
          lrelease "${SOURCE_DIR_MSYS}/openterfaceQT.pro"
          
          echo "Configuring with CMake..."
          cmake -G "MinGW Makefiles" \
            -DCMAKE_BUILD_TYPE=Release \
            -DFFMPEG_PREFIX=C:/ffmpeg-shared \
            -DUSE_SHARED_FFMPEG=ON \
            -DHAVE_LIBJPEG_TURBO=ON \
            "$SOURCE_DIR_MSYS"
          echo "Building with mingw32-make..."
          mingw32-make -j2
          if [ ! -f openterfaceQT.exe ]; then
            echo "Error: Failed to build openterfaceQT.exe"
            exit 1
          fi
          echo "Build directory contents:"
          ls -la
          # ... rest of packaging steps (copy files, etc.)
          mkdir -p ${{ env.PACKAGE_DIR }}/driver/windows
          mkdir -p ${{ env.PACKAGE_DIR }}/config/languages
          mkdir -p ${{ env.PACKAGE_DIR }}/config/keyboards
          cp openterfaceQT.exe ${{ env.PACKAGE_DIR }}/${{ env.EXE_NAME }}
          cp "${SOURCE_DIR_MSYS}/LICENSE" ${{ env.PACKAGE_DIR }}
          cp "${SOURCE_DIR_MSYS}/driver/windows/"* ${{ env.PACKAGE_DIR }}/driver/windows/
          echo "Copying FFmpeg DLLs..."
          cp /c/ffmpeg-shared/bin/av*.dll ${{ env.PACKAGE_DIR }}
          cp /c/ffmpeg-shared/bin/sw*.dll ${{ env.PACKAGE_DIR }}
          cp /c/ffmpeg-shared/bin/postproc-57.dll ${{ env.PACKAGE_DIR }} || echo "Warning: postproc-57.dll not found"
          cp /c/ffmpeg-shared/bin/libturbojpeg.dll ${{ env.PACKAGE_DIR }}
          # GPU driver libraries are not redistributed automatically; copy if available to make debugging easier
          if [ -f "/c/Windows/System32/nvcuvid.dll" ]; then
              cp "/c/Windows/System32/nvcuvid.dll" ${{ env.PACKAGE_DIR }} || true
              echo "✓ Copied nvcuvid.dll from system";
          fi
          if [ -f "/c/Windows/System32/libmfx.dll" ]; then
              cp "/c/Windows/System32/libmfx.dll" ${{ env.PACKAGE_DIR }} || true
              echo "✓ Copied Intel libmfx.dll from system";
          fi
          echo "Copying LibUSB DLLs..."
          LIBUSB_FOUND=false
          
          # Priority 1: Check cache for MinGW-compatible LibUSB
          if [ -f "/c/libusb/bin/msys-usb-1.0.dll" ]; then
            cp /c/libusb/bin/msys-usb-1.0.dll ${{ env.PACKAGE_DIR }}
            # Also create libusb-1.0.dll for compatibility
            cp /c/libusb/bin/msys-usb-1.0.dll ${{ env.PACKAGE_DIR }}/libusb-1.0.dll
            echo "✓ Copied msys-usb-1.0.dll from cache and created libusb-1.0.dll"
            LIBUSB_FOUND=true
          elif [ -f "/c/libusb/bin/libusb-1.0.dll" ]; then
            cp /c/libusb/bin/libusb-1.0.dll ${{ env.PACKAGE_DIR }}
            cp /c/libusb/bin/libusb-1.0.dll ${{ env.PACKAGE_DIR }}/msys-usb-1.0.dll
            echo "✓ Copied libusb-1.0.dll and created msys-usb-1.0.dll from cache"
            LIBUSB_FOUND=true
          fi
          
          # Priority 2: Check MinGW64 directly (best ABI compatibility with Qt)
          if [ "$LIBUSB_FOUND" = "false" ] && [ -f "/mingw64/bin/libusb-1.0.dll" ]; then
            cp /mingw64/bin/libusb-1.0.dll ${{ env.PACKAGE_DIR }}
            cp /mingw64/bin/libusb-1.0.dll ${{ env.PACKAGE_DIR }}/msys-usb-1.0.dll
            echo "✓ Copied MinGW libusb-1.0.dll and created msys-usb-1.0.dll (best compatibility)"
            
            # Copy MinGW runtime dependencies to prevent ABI mismatches
            cp /mingw64/bin/libgcc_s_dw2-1.dll ${{ env.PACKAGE_DIR }} 2>/dev/null || echo "MinGW libgcc_s_dw2-1.dll not needed"
            cp /mingw64/bin/libwinpthread-1.dll ${{ env.PACKAGE_DIR }} 2>/dev/null && echo "✓ Copied MinGW pthread" || echo "MinGW pthread not needed"
            LIBUSB_FOUND=true
            
          # No UCRT64 fallback (MinGW64 only)
          fi
          
          # Copy additional MinGW runtime DLLs that may be needed for LibUSB compatibility
          if [ "$LIBUSB_FOUND" = "true" ]; then
            echo "Ensuring runtime compatibility..."
            # Note: Qt is built with MinGW, so ensure MinGW runtimes are present when using LibUSB
            for dll in libgcc_s_dw2-1.dll libwinpthread-1.dll; do
              if [ -f "/mingw64/bin/$dll" ] && [ ! -f "${{ env.PACKAGE_DIR }}/$dll" ]; then
                cp "/mingw64/bin/$dll" ${{ env.PACKAGE_DIR }} && echo "✓ Copied MinGW runtime $dll"
              fi
            done
          fi
          
          # Final comprehensive search if still not found
          if [ "$LIBUSB_FOUND" = "false" ]; then
            echo "⚠ LibUSB DLL not found in preferred locations, searching comprehensively..."
            USB_DLLS=$(find /mingw64 -name "*usb*.dll" 2>/dev/null | head -5)
            if [ -n "$USB_DLLS" ]; then
              echo "Found USB DLLs: $USB_DLLS"
              for dll in $USB_DLLS; do
                dll_name=$(basename "$dll")
                cp "$dll" ${{ env.PACKAGE_DIR }}/
                if [ "$dll_name" = "libusb-1.0.dll" ]; then
                  cp "$dll" ${{ env.PACKAGE_DIR }}/msys-usb-1.0.dll
                  echo "✓ Created msys-usb-1.0.dll from found $dll_name"
                fi
                echo "✓ Copied $dll_name from $(dirname "$dll")"
                LIBUSB_FOUND=true
              done
            fi
          fi
          
          # CRITICAL: Fail the build if LibUSB DLL is missing
          if [ "$LIBUSB_FOUND" = "false" ]; then
            echo "✗✗✗ CRITICAL ERROR: LibUSB DLL not found ✗✗✗"
            echo "Application cannot run without libusb-1.0.dll"
            echo "This will cause heap corruption errors (c0000374) at runtime."
            echo ""
            echo "Debugging information:"
            echo "  - Cache location: /c/libusb/bin/"
            ls -la /c/libusb/bin/ 2>/dev/null || echo "    Cache directory does not exist or is empty"
            echo "  - MinGW64 location: /mingw64/bin/"
            ls -la /mingw64/bin/*usb* 2>/dev/null || echo "    No USB DLLs in MinGW64"
            echo "  - Installed USB packages:"
            pacman -Q | grep -i usb || echo "    No USB packages found"
            echo ""
            echo "TERMINATING BUILD - LibUSB DLL is required"
            exit 1
          fi
          
          # Verify the DLL was actually copied
          if [ ! -f "${{ env.PACKAGE_DIR }}/libusb-1.0.dll" ]; then
            echo "✗✗✗ CRITICAL ERROR: libusb-1.0.dll not found in package directory after copy ✗✗✗"
            ls -la ${{ env.PACKAGE_DIR }}/*usb* 2>/dev/null || echo "No USB DLLs in package directory"
            exit 1
          fi
          
          echo "✓✓✓ LibUSB DLL setup completed successfully ✓✓✓"
          echo "Verifying copied files:"
          ls -la ${{ env.PACKAGE_DIR }}/*usb* || echo "Warning: No USB DLLs visible (but copy succeeded)"
          echo "Copying MSYS2 runtime dependencies (non-C++ runtime)..."
          cp /mingw64/bin/libiconv-2.dll ${{ env.PACKAGE_DIR }} || echo "Warning: libiconv-2.dll not found"
          cp /mingw64/bin/libbz2-1.dll ${{ env.PACKAGE_DIR }} || echo "Warning: libbz2-1.dll not found"
          cp /mingw64/bin/liblzma-5.dll ${{ env.PACKAGE_DIR }} || echo "Warning: liblzma-5.dll not found"
          cp /mingw64/bin/zlib1.dll ${{ env.PACKAGE_DIR }} || echo "Warning: zlib1.dll not found"
          cp /mingw64/bin/libmfx-1.dll ${{ env.PACKAGE_DIR }} || echo "Warning: libmfx-1.dll not found"
          # NOTE: Do NOT copy libwinpthread, libgcc, libstdc++ here!
          # Let windeployqt copy them from Qt's MinGW installation for ABI compatibility
          echo "Copying translation & keyboard layouts files..."
          cp "${SOURCE_DIR_MSYS}/config/keyboards/"*.json ${{ env.PACKAGE_DIR }}/config/keyboards/
          cp "${SOURCE_DIR_MSYS}/config/languages/"*.qm ${{ env.PACKAGE_DIR }}/config/languages/
          echo "Build step complete. Proceeding to windeployqt..."
          cd ${{ env.PACKAGE_DIR }}
          # Note: windeployqt is a Windows executable, so we need to call it from cmd
          # We'll switch back to cmd shell for this step

      - name: Analyze and collect all DLL dependencies
        working-directory: ${{ runner.temp }}\build\${{ env.PACKAGE_DIR }}
        shell: msys2 {0}
        run: |
          echo "============================================================================"
          echo "Step 1: Analyzing DLL dependencies before windeployqt"
          echo "============================================================================"
          
          echo ""
          echo "=== Checking openterfaceQT.exe dependencies ==="
          if command -v objdump >/dev/null 2>&1; then
            objdump -p openterfaceQT.exe | grep "DLL Name:" | sort -u > exe_deps.txt
            cat exe_deps.txt
          fi
          
          echo ""
          echo "=== Checking FFmpeg DLL dependencies ==="
          for dll in avcodec-60.dll avformat-60.dll avutil-58.dll; do
            if [ -f "$dll" ]; then
              echo "Dependencies of $dll:"
              objdump -p "$dll" | grep "DLL Name:" | sort -u || true
            fi
          done
          
          echo ""
          echo "=== Current MSYS2 MinGW runtime versions ==="
          ls -lh /mingw64/bin/libstdc++-6.dll /mingw64/bin/libgcc_s_seh-1.dll /mingw64/bin/libwinpthread-1.dll 2>/dev/null || true
          
          echo "============================================================================"

      - name: Run windeployqt (Windows native tool)
        working-directory: ${{ runner.temp }}\build\${{ env.PACKAGE_DIR }}
        run: |
          echo "Running windeployqt to deploy Qt dependencies..."
          windeployqt ${{ env.EXE_NAME }} --multimedia --network
          echo "windeployqt completed"

      - name: Ensure compatible MinGW runtime libraries
        working-directory: ${{ runner.temp }}\build\${{ env.PACKAGE_DIR }}
        shell: msys2 {0}
        run: |
          echo "============================================================================"
          echo "Step 2: FORCE using MSYS2 MinGW runtime libraries"
          echo "============================================================================"
          echo ""
          echo "STRATEGY: Always use MSYS2's runtime DLLs, because:"
          echo "  - Application compiled with MSYS2 MinGW (GCC 13+)"
          echo "  - FFmpeg compiled with MSYS2 MinGW (GCC 13+)"
          echo "  - Qt's bundled libstdc++ is OLDER (GCC 11.x) and LACKS new symbols like:"
          echo "    * _M_replace_cold (GCC 12+)"
          echo "    * pthread_cond_timedwait64 (modern POSIX)"
          echo "    * clock_gettime64 (modern POSIX)"
          echo "  - Even if ABI matches, missing newer symbols = runtime failure"
          echo ""
          echo "ROOT CAUSE of '_ZNSt7__cxx1112basic_string..._M_replace_cold not found':"
          echo "  Qt's libstdc++ is GCC 11.x era → does NOT have _M_replace_cold"
          echo "  App built with GCC 13+ → REQUIRES _M_replace_cold"
          echo ""
          
          # ====================================================================
          # Step 2.1: Detect what application needs (for diagnostic logging only)
          # ====================================================================
          echo "=== Step 2.1: Application requirements (diagnostic) ==="
          
          if objdump -p openterfaceQT.exe | grep -q "_ZNSt7__cxx11"; then
            echo "  Application uses NEW C++11 ABI"
            APP_NEEDS_NEW_ABI=1
          else
            echo "  Application uses OLD ABI"
            APP_NEEDS_NEW_ABI=0
          fi
          
          # Check for specific newer symbols the app needs
          NEEDS_REPLACE_COLD=0
          if objdump -p openterfaceQT.exe | grep -q "_M_replace_cold"; then
            echo "  Application needs _M_replace_cold (GCC 12+ symbol)"
            NEEDS_REPLACE_COLD=1
          fi
          
          echo ""
          
          # ====================================================================
          # Step 2.2: FORCE replace all MinGW runtime DLLs with MSYS2 versions
          # ====================================================================
          echo "=== Step 2.2: Forcing MSYS2 runtime DLLs (overwriting Qt's versions) ==="
          echo ""
          
          # Verify MSYS2 runtime DLLs are available
          for src in /mingw64/bin/libstdc++-6.dll /mingw64/bin/libgcc_s_seh-1.dll /mingw64/bin/libwinpthread-1.dll; do
            if [ ! -f "$src" ]; then
              echo "✗✗✗ FATAL: $src not found in MSYS2"
              echo "MSYS2 MinGW64 toolchain is not installed correctly"
              exit 1
            fi
          done
          
          # Backup Qt's versions for diagnostics
          for dll in libstdc++-6.dll libgcc_s_seh-1.dll libwinpthread-1.dll; do
            if [ -f "$dll" ]; then
              old_size=$(stat -c%s "$dll" 2>/dev/null || echo "?")
              echo "  Qt's $dll: $old_size bytes (will be replaced)"
            else
              echo "  $dll not present (will be installed)"
            fi
          done
          
          echo ""
          echo "Copying MSYS2 runtime DLLs (forced overwrite)..."
          
          # Force copy all three critical runtime DLLs from MSYS2
          cp -f /mingw64/bin/libstdc++-6.dll . || { echo "✗ Failed to copy libstdc++-6.dll"; exit 1; }
          cp -f /mingw64/bin/libgcc_s_seh-1.dll . || { echo "✗ Failed to copy libgcc_s_seh-1.dll"; exit 1; }
          cp -f /mingw64/bin/libwinpthread-1.dll . || { echo "✗ Failed to copy libwinpthread-1.dll"; exit 1; }
          
          echo ""
          for dll in libstdc++-6.dll libgcc_s_seh-1.dll libwinpthread-1.dll; do
            new_size=$(stat -c%s "$dll" 2>/dev/null || echo "?")
            echo "  ✓ $dll: $new_size bytes (MSYS2 GCC 13+)"
          done
          
          echo ""
          
          # ====================================================================
          # Step 2.3: Verify replacements have required symbols
          # ====================================================================
          echo "=== Step 2.3: Verifying MSYS2 runtime has all required symbols ==="
          
          VERIFY_FAIL=0
          
          # Check libstdc++-6.dll
          echo ""
          echo "Checking libstdc++-6.dll..."
          if objdump -p libstdc++-6.dll | grep -q "_ZNSt7__cxx11"; then
            echo "  ✓ Has NEW C++11 ABI symbols (_ZNSt7__cxx11)"
          else
            echo "  ✗ Missing NEW C++11 ABI symbols!"
            VERIFY_FAIL=1
          fi
          
          if objdump -p libstdc++-6.dll | grep -q "_M_replace_cold"; then
            echo "  ✓ Has _M_replace_cold (GCC 12+ symbol)"
          else
            if [ "$NEEDS_REPLACE_COLD" = "1" ]; then
              echo "  ✗ Missing _M_replace_cold but app needs it!"
              VERIFY_FAIL=1
            else
              echo "  ⚠ Missing _M_replace_cold (app does not require it)"
            fi
          fi
          
          # Check libwinpthread-1.dll
          echo ""
          echo "Checking libwinpthread-1.dll..."
          if objdump -p libwinpthread-1.dll | grep -q "pthread_cond_timedwait64"; then
            echo "  ✓ Has pthread_cond_timedwait64"
          else
            echo "  ✗ Missing pthread_cond_timedwait64 (FFmpeg needs it)"
            VERIFY_FAIL=1
          fi
          
          if objdump -p libwinpthread-1.dll | grep -q "clock_gettime64"; then
            echo "  ✓ Has clock_gettime64"
          else
            echo "  ✗ Missing clock_gettime64 (FFmpeg needs it)"
            VERIFY_FAIL=1
          fi
          
          if [ "$VERIFY_FAIL" = "1" ]; then
            echo ""
            echo "✗✗✗ FATAL: MSYS2 runtime is missing required symbols!"
            echo "This is unexpected. MSYS2 toolchain may be outdated."
            echo "Try: pacman -Syu mingw-w64-x86_64-gcc"
            exit 1
          fi
          
          echo ""
          echo "✓✓✓ All MSYS2 runtime DLLs verified - app should run correctly"
          echo "============================================================================"

      - name: Comprehensive DLL dependency verification
        working-directory: ${{ runner.temp }}\build\${{ env.PACKAGE_DIR }}
        shell: msys2 {0}
        run: |
          echo "============================================================================"
          echo "Comprehensive DLL Dependency Verification"
          echo "============================================================================"
          
          # Function to check DLL dependencies
          check_dll_deps() {
            local target="$1"
            local name=$(basename "$target")
            echo ""
            echo "=== Checking $name ==="
            
            if [ ! -f "$target" ]; then
              echo "✗ File not found: $target"
              return 1
            fi
            
            # Get all DLL dependencies
            local deps=$(objdump -p "$target" | grep "DLL Name:" | awk '{print $3}' | sort -u)
            local missing=0
            
            for dep in $deps; do
              # Skip system DLLs
              if echo "$dep" | grep -qiE "^(KERNEL32|USER32|ADVAPI32|SHELL32|ole32|GDI32|WS2_32|msvcrt|MSVCP|VCRUNTIME)"; then
                continue
              fi
              
              # Check if DLL exists in package
              if [ -f "$dep" ]; then
                echo "  ✓ $dep"
              elif [ -f "${dep,,}" ]; then
                echo "  ✓ ${dep,,} (case mismatch)"
              else
                # Check in subdirectories (plugins, etc)
                if find . -iname "$dep" -type f | grep -q .; then
                  local found_path=$(find . -iname "$dep" -type f | head -1)
                  echo "  ✓ $dep (found at $found_path)"
                else
                  echo "  ✗✗✗ MISSING: $dep"
                  missing=$((missing + 1))
                fi
              fi
            done
            
            if [ $missing -gt 0 ]; then
              echo "  ✗✗✗ $name has $missing missing dependencies!"
              return 1
            else
              echo "  ✓ All dependencies satisfied for $name"
              return 0
            fi
          }
          
          # Track overall status
          TOTAL_ISSUES=0
          
          # Check main executable
          check_dll_deps "openterfaceQT.exe" || TOTAL_ISSUES=$((TOTAL_ISSUES + 1))
          
          # Check Qt DLLs (sample)
          for dll in Qt6Core.dll Qt6Gui.dll Qt6Multimedia.dll Qt6MultimediaWidgets.dll; do
            if [ -f "$dll" ]; then
              check_dll_deps "$dll" || TOTAL_ISSUES=$((TOTAL_ISSUES + 1))
            fi
          done
          
          # Check FFmpeg DLLs
          for dll in avcodec-60.dll avformat-60.dll avutil-58.dll swresample-4.dll swscale-7.dll; do
            if [ -f "$dll" ]; then
              check_dll_deps "$dll" || TOTAL_ISSUES=$((TOTAL_ISSUES + 1))
            fi
          done
          
          echo ""
          echo "============================================================================"
          echo "=== Critical MinGW Runtime DLL Verification ==="
          echo "============================================================================"
          
          CRITICAL_DLLS=("libstdc++-6.dll" "libgcc_s_seh-1.dll" "libwinpthread-1.dll")
          RUNTIME_ISSUES=0
          
          for dll in "${CRITICAL_DLLS[@]}"; do
            if [ -f "$dll" ]; then
              size=$(stat -c%s "$dll" 2>/dev/null || echo "unknown")
              echo "✓ $dll ($size bytes)"
              
              # Special checks for pthread
              if [ "$dll" = "libwinpthread-1.dll" ]; then
                echo "  Checking for modern POSIX functions..."
                if objdump -p "$dll" | grep -q "pthread_cond_timedwait64"; then
                  echo "  ✓ Has pthread_cond_timedwait64"
                else
                  echo "  ✗✗✗ Missing pthread_cond_timedwait64 (FFmpeg will fail!)"
                  RUNTIME_ISSUES=$((RUNTIME_ISSUES + 1))
                fi
                
                if objdump -p "$dll" | grep -q "clock_gettime64"; then
                  echo "  ✓ Has clock_gettime64"
                else
                  echo "  ✗✗✗ Missing clock_gettime64 (FFmpeg will fail!)"
                  RUNTIME_ISSUES=$((RUNTIME_ISSUES + 1))
                fi
              fi
            else
              echo "✗✗✗ CRITICAL: $dll is MISSING!"
              RUNTIME_ISSUES=$((RUNTIME_ISSUES + 1))
            fi
          done
          
          echo ""
          echo "============================================================================"
          echo "=== Verification Summary ==="
          echo "============================================================================"
          echo "Total dependency issues: $TOTAL_ISSUES"
          echo "Critical runtime issues: $RUNTIME_ISSUES"
          
          if [ $RUNTIME_ISSUES -gt 0 ]; then
            echo ""
            echo "✗✗✗ FATAL: Critical runtime library issues detected!"
            echo "The application WILL NOT RUN correctly."
            echo "Expected errors:"
            echo "  - __emutls_v._ZSt11__once_call not found"
            echo "  - clock_gettime64 not found"
            echo "  - pthread_cond_timedwait64 not found"
            exit 1
          fi
          
          if [ $TOTAL_ISSUES -gt 0 ]; then
            echo ""
            echo "⚠ WARNING: Some dependency issues detected (may not be critical)"
            echo "Check the log above for details"
          else
            echo ""
            echo "✓✓✓ All dependencies verified successfully!"
          fi
          
          echo "============================================================================"

      - name: Final package contents check
        working-directory: ${{ runner.temp }}\build\${{ env.PACKAGE_DIR }}
        shell: msys2 {0}
        run: |
          echo "============================================================================"
          echo "Final Package Contents Check (before NSIS)"
          echo "============================================================================"
          
          echo ""
          echo "=== Critical files checklist ==="
          
          # Main executable
          [ -f "openterfaceQT.exe" ] && echo "✓ openterfaceQT.exe" || { echo "✗ openterfaceQT.exe MISSING"; exit 1; }
          
          # MinGW runtime - CRITICAL!
          echo ""
          echo "MinGW Runtime (CRITICAL - without these, app will NOT run):"
          
          # First detect what the app needs
          echo ""
          echo "Detecting application ABI requirements..."
          APP_NEEDS_NEW_ABI=0
          if objdump -p openterfaceQT.exe | grep -q "_ZNSt7__cxx11"; then
            echo "  Application uses NEW C++11 ABI (GCC 5+)"
            APP_NEEDS_NEW_ABI=1
          else
            echo "  Application uses OLD ABI (GCC 4.x)"
          fi
          
          echo ""
          for dll in libstdc++-6.dll libgcc_s_seh-1.dll libwinpthread-1.dll; do
            if [ -f "$dll" ]; then
              size=$(stat -c%s "$dll" 2>/dev/null || echo "unknown")
              echo "✓ $dll ($size bytes)"
              
              # Extra verification for libstdc++-6.dll - CHECK ABI MATCH!
              if [ "$dll" = "libstdc++-6.dll" ]; then
                echo "  Checking C++ ABI compatibility..."
                
                # Check if DLL has new ABI symbols
                DLL_HAS_NEW_ABI=0
                if objdump -p "$dll" | grep -q "_ZNSt7__cxx11"; then
                  DLL_HAS_NEW_ABI=1
                fi
                
                # Verify ABI matches application
                if [ "$APP_NEEDS_NEW_ABI" = "1" ]; then
                  if [ "$DLL_HAS_NEW_ABI" = "1" ]; then
                    echo "  ✓ NEW C++11 ABI (matches application requirement)"
                  else
                    echo "  ✗✗✗ FATAL: ABI MISMATCH!"
                    echo "  Application needs NEW ABI but DLL provides OLD ABI"
                    echo "  This will cause: 无法定位程序输入点 _ZNSt7__cxx1112basic_string... 于动态链接库"
                    exit 1
                  fi
                else
                  if [ "$DLL_HAS_NEW_ABI" = "1" ]; then
                    echo "  ⚠ WARNING: DLL has NEW ABI but app uses OLD ABI (may cause issues)"
                  else
                    echo "  ✓ OLD ABI (matches application requirement)"
                  fi
                fi
              fi
              
              # Extra verification for libwinpthread-1.dll
              if [ "$dll" = "libwinpthread-1.dll" ]; then
                PTHREAD_OK=1
                if objdump -p "$dll" | grep -q "pthread_cond_timedwait64"; then
                  echo "  ✓ Has pthread_cond_timedwait64 (required by FFmpeg)"
                else
                  echo "  ✗✗✗ FATAL: Missing pthread_cond_timedwait64!"
                  echo "  FFmpeg will fail at runtime"
                  PTHREAD_OK=0
                fi
                if objdump -p "$dll" | grep -q "clock_gettime64"; then
                  echo "  ✓ Has clock_gettime64 (required by FFmpeg)"
                else
                  echo "  ✗✗✗ FATAL: Missing clock_gettime64!"
                  echo "  FFmpeg will fail at runtime"
                  PTHREAD_OK=0
                fi
                if [ $PTHREAD_OK -eq 0 ]; then
                  exit 1
                fi
              fi
            else
              echo "✗✗✗ $dll MISSING!"
              exit 1
            fi
          done
          
          # Qt core DLLs
          echo ""
          echo "Qt DLLs:"
          for dll in Qt6Core.dll Qt6Gui.dll Qt6Widgets.dll Qt6Multimedia.dll; do
            [ -f "$dll" ] && echo "✓ $dll" || { echo "✗ $dll MISSING"; exit 1; }
          done
          
          # FFmpeg DLLs
          echo ""
          echo "FFmpeg DLLs:"
          for dll in avcodec-60.dll avformat-60.dll avutil-58.dll; do
            [ -f "$dll" ] && echo "✓ $dll" || { echo "✗ $dll MISSING"; exit 1; }
          done
          
          # LibUSB
          echo ""
          echo "Other dependencies:"
          [ -f "libusb-1.0.dll" ] && echo "✓ libusb-1.0.dll" || { echo "✗ libusb-1.0.dll MISSING"; exit 1; }
          
          echo ""
          echo "=== Package statistics ==="
          echo "Total files: $(find . -type f | wc -l)"
          echo "Total DLLs: $(find . -name '*.dll' | wc -l)"
          echo "Package size: $(du -sh . | cut -f1)"
          
          echo ""
          echo "=== All DLLs in root directory (will be in installer) ==="
          ls -1 *.dll 2>/dev/null | head -30 || echo "No DLLs found"
          
          echo ""
          echo "✓✓✓ All critical files present - ready for NSIS packaging"
          echo "============================================================================"
          
          # Create a manifest file for debugging
          echo "Creating package manifest..."
          find . -type f -name "*.dll" | sort > dll_manifest.txt
          echo "DLL manifest created ($(wc -l < dll_manifest.txt) DLLs)"

      - name: Upload package directory for inspection
        uses: actions/upload-artifact@v4
        with:
          name: package-directory-before-nsis
          path: ${{ runner.temp }}\build\${{ env.PACKAGE_DIR }}
          retention-days: 3

      - name: Runtime dependency test (quick sanity check)
        working-directory: ${{ runner.temp }}\build\${{ env.PACKAGE_DIR }}
        shell: msys2 {0}
        run: |
          echo "============================================================================"
          echo "Runtime Dependency Test - Quick Sanity Check"
          echo "============================================================================"
          echo ""
          echo "Testing if openterfaceQT.exe can load its dependencies..."
          echo "Note: We won't actually run the GUI, just check if DLLs load"
          echo ""
          
          # Use ldd to check if all dependencies can be resolved
          if command -v ldd >/dev/null 2>&1; then
            echo "=== Running ldd on openterfaceQT.exe ==="
            if ldd openterfaceQT.exe > ldd_output.txt 2>&1; then
              cat ldd_output.txt
              
              # Check for "not found" errors
              if grep -i "not found" ldd_output.txt; then
                echo ""
                echo "✗✗✗ FATAL: Some DLLs cannot be found at runtime!"
                echo "The application will NOT start on user machines."
                exit 1
              else
                echo ""
                echo "✓ All DLLs can be resolved"
              fi
            else
              echo "ldd failed, but continuing..."
            fi
          fi
          
          echo ""
          echo "=== Testing Qt6Multimedia.dll specifically ==="
          if [ -f "Qt6Multimedia.dll" ]; then
            if ldd Qt6Multimedia.dll > qt_multimedia_ldd.txt 2>&1; then
              echo "Qt6Multimedia.dll dependencies:"
              cat qt_multimedia_ldd.txt | head -20
              
              # Check for libstdc++ specifically
              if grep -q "libstdc++-6.dll" qt_multimedia_ldd.txt; then
                if grep "libstdc++-6.dll" qt_multimedia_ldd.txt | grep -q "not found"; then
                  echo ""
                  echo "✗✗✗ CRITICAL: Qt6Multimedia.dll cannot find libstdc++-6.dll!"
                  echo "This is why you get '__emutls_v._ZSt11__once_call not found' error!"
                  exit 1
                else
                  resolved_path=$(grep "libstdc++-6.dll" qt_multimedia_ldd.txt | awk '{print $3}')
                  echo ""
                  echo "✓ Qt6Multimedia.dll can find libstdc++-6.dll at: $resolved_path"
                fi
              fi
            fi
          fi
          
          echo ""
          echo "✓✓✓ Runtime dependency test passed"
          echo "============================================================================"

      - name: Upload Output folder
        uses: actions/upload-artifact@v4
        with:
          name: output-folder
          path: ${{ env.SOURCE_DIR }}\Output
          if-no-files-found: warn 

      - name: Install NSIS (if missing)
        shell: pwsh
        run: |
          if (-not (Get-Command makensis -ErrorAction SilentlyContinue)) {
            Write-Host "makensis not found; installing NSIS via Chocolatey..."
            choco install nsis -y
          } else {
            Write-Host "makensis already available"
          }

      - name: Compile .NSI to .EXE Installer
        shell: pwsh
        run: |
          Write-Host "Compiling NSIS installer..."
          $pkg = "${{ runner.temp }}\build\${{ env.PACKAGE_DIR }}"
          if (-not (Test-Path $pkg)) {
            Write-Host "Package dir not found: $pkg"; exit 1
          }
          New-Item -ItemType Directory -Path "${{ env.SOURCE_DIR }}\Output" -Force | Out-Null
          # Run makensis with defines used by installer script
          & makensis /DWorkingDir="$pkg" /DMyAppVersion="${{ env.NEW_VERSION }}" /DMyAppPublisher="${{ vars.MY_APP_PUBLISHER }}" /DMyAppURL="${{ vars.MY_APP_URL }}" /DOutputDir="${{ env.SOURCE_DIR }}\Output" /DOutputBaseFileName=openterfaceQT.windows.amd64.installer /DMyAppExeName=${{ env.EXE_NAME }} "${{ env.SOURCE_DIR }}\installer.nsi"
          if ($LASTEXITCODE -ne 0) { Write-Host "makensis failed with exit code $LASTEXITCODE"; exit $LASTEXITCODE }
          Write-Host "Installer build completed. Listing Output directory:"
          Get-ChildItem "${{ env.SOURCE_DIR }}\Output" -Recurse | Select-Object -First 200

      - name: Upload windows installer
        uses: actions/upload-artifact@v4
        with:
          name: openterfaceQT_windows_amd64_installer
          path: ${{ env.SOURCE_DIR }}\Output\*.exe
          if-no-files-found: error

      - name: Copy package to workspace for inspection (optional)
        shell: pwsh
        run: |
          $src = "${{ runner.temp }}\build\${{ env.PACKAGE_DIR }}"
          $dst = "${{ env.SOURCE_DIR }}\${{ env.PACKAGE_DIR }}"
          if (Test-Path $src) {
            Remove-Item -Recurse -Force $dst -ErrorAction SilentlyContinue || true
            Copy-Item -Recurse -Force $src $dst
            Write-Host "Copied package to workspace: $dst"
          } else {
            Write-Host "Package dir not found: $src"
          }

