name: Build / Openterface Windows ARM64 (Static)

on:
  push:
    branches: ["main", "dev_1223_portable_build", "dev_260628_arm64_static_qt_build"]
    tags: ["v*"]
    paths:
      - '.github/workflows/windows-arm64-build.yaml'
      - 'vcpkg.json'
      - 'CMakeLists.txt'
      - '**/*.bat'
      - '**/*.cpp'
      - 'build-script/build-static-qt-from-source.sh'
      - 'build-script/build-static-ffmpeg-windows.sh'
  pull_request:
    branches: ["main"]
    paths:
      - '.github/workflows/windows-arm64-build.yaml'
      - 'vcpkg.json'
      - 'CMakeLists.txt'
      - '**/*.bat'
      - '**/*.cpp'
      - 'build-script/build-static-qt-from-source.sh'
      - 'build-script/build-static-ffmpeg-windows.sh'
  workflow_dispatch:

env:
  # ARM64-specific prefixes, distinct from x86_64 to avoid cache collisions.
  QT_PREFIX: C:\\Qt6-arm64
  FFMPEG_PREFIX: C:\\ffmpeg-static-arm64
  # ARCH=arm64 drives parameterized build scripts (build-static-qt-from-source.sh,
  # build-static-ffmpeg-windows.sh) to pick clang + /clangarm64 + /c/Qt6-arm64.
  ARCH: arm64

permissions:
  contents: write
  actions: write

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: setup-env
  # Sets up MSYS2 CLANGARM64 with the static libs needed by Qt + FFmpeg builds,
  # then probes the cache so downstream jobs know whether to build from source.
  # ---------------------------------------------------------------------------
  setup-env:
    name: Setup ARM64 Build Environment
    runs-on: windows-11-arm
    outputs:
      qt-cache-hit: ${{ steps.cache-qt.outputs.cache-hit }}
      ffmpeg-cache-hit: ${{ steps.cache-ffmpeg.outputs.cache-hit }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup MSYS2 CLANGARM64 (static-build deps)
        uses: msys2/setup-msys2@v2
        with:
          msystem: CLANGARM64
          update: true
          install: |
            mingw-w64-clang-aarch64-clang
            mingw-w64-clang-aarch64-compiler-rt
            mingw-w64-clang-aarch64-cmake
            mingw-w64-clang-aarch64-ninja
            mingw-w64-clang-aarch64-make
            mingw-w64-clang-aarch64-nasm
            mingw-w64-clang-aarch64-pkgconf
            mingw-w64-clang-aarch64-zlib
            mingw-w64-clang-aarch64-bzip2
            mingw-w64-clang-aarch64-xz
            mingw-w64-clang-aarch64-openssl
            mingw-w64-clang-aarch64-libiconv
            mingw-w64-clang-aarch64-libb2
            mingw-w64-clang-aarch64-brotli
            mingw-w64-clang-aarch64-libjpeg-turbo
            mingw-w64-clang-aarch64-libusb
            mingw-w64-clang-aarch64-pcre2
            mingw-w64-clang-aarch64-zstd
            mingw-w64-clang-aarch64-lz4
            mingw-w64-clang-aarch64-lzo2
            mingw-w64-clang-aarch64-libxml2
            mingw-w64-clang-aarch64-libpng
            mingw-w64-clang-aarch64-freetype
            mingw-w64-clang-aarch64-fontconfig
            mingw-w64-clang-aarch64-harfbuzz
            mingw-w64-clang-aarch64-pixman
            mingw-w64-clang-aarch64-glib2
            mingw-w64-clang-aarch64-gettext-runtime
            mingw-w64-clang-aarch64-expat
            mingw-w64-clang-aarch64-libffi
            mingw-w64-clang-aarch64-p11-kit
            mingw-w64-clang-aarch64-libtasn1
            mingw-w64-clang-aarch64-gmp
            mingw-w64-clang-aarch64-nettle
            mingw-w64-clang-aarch64-libunistring
            mingw-w64-clang-aarch64-libidn2
            mingw-w64-clang-aarch64-libpsl
            mingw-w64-clang-aarch64-nghttp2
            mingw-w64-clang-aarch64-nghttp3
            mingw-w64-clang-aarch64-ngtcp2
            mingw-w64-clang-aarch64-curl
            mingw-w64-clang-aarch64-ca-certificates
            mingw-w64-clang-aarch64-libunwind
            diffutils
            make
            libtool
            git
            perl

      - name: Cache Qt static build (ARM64)
        id: cache-qt
        uses: actions/cache@v4
        with:
          path: ${{ env.QT_PREFIX }}
          key: qt-6.6.3-msys2-clangarm64-windows-static-v1-${{ hashFiles('build-script/build-static-qt-from-source.sh') }}

      - name: Cache FFmpeg static build (ARM64)
        id: cache-ffmpeg
        uses: actions/cache@v4
        with:
          path: ${{ env.FFMPEG_PREFIX }}
          key: ffmpeg-static-msys2-clangarm64-windows-v1-${{ hashFiles('build-script/build-static-ffmpeg-windows.sh') }}

  # ---------------------------------------------------------------------------
  # Job 2: build-qt
  # Builds Qt 6.6.3 statically from source for ARM64 using clang from
  # MSYS2 CLANGARM64. Caches the resulting prefix so subsequent runs skip this.
  # ---------------------------------------------------------------------------
  build-qt:
    name: Build Qt 6.6.3 (Static, ARM64)
    needs: setup-env
    runs-on: windows-11-arm
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSYS2 CLANGARM64
        uses: msys2/setup-msys2@v2
        with:
          msystem: CLANGARM64
          update: true
          install: |
            mingw-w64-clang-aarch64-clang
            mingw-w64-clang-aarch64-compiler-rt
            mingw-w64-clang-aarch64-cmake
            mingw-w64-clang-aarch64-ninja
            mingw-w64-clang-aarch64-make
            mingw-w64-clang-aarch64-nasm
            mingw-w64-clang-aarch64-pkgconf
            mingw-w64-clang-aarch64-zlib
            mingw-w64-clang-aarch64-bzip2
            mingw-w64-clang-aarch64-xz
            mingw-w64-clang-aarch64-openssl
            mingw-w64-clang-aarch64-libiconv
            mingw-w64-clang-aarch64-libb2
            mingw-w64-clang-aarch64-brotli
            mingw-w64-clang-aarch64-libjpeg-turbo
            mingw-w64-clang-aarch64-pcre2
            mingw-w64-clang-aarch64-zstd
            mingw-w64-clang-aarch64-libpng
            mingw-w64-clang-aarch64-freetype
            mingw-w64-clang-aarch64-fontconfig
            mingw-w64-clang-aarch64-harfbuzz
            mingw-w64-clang-aarch64-pixman
            mingw-w64-clang-aarch64-glib2
            mingw-w64-clang-aarch64-gettext-runtime
            mingw-w64-clang-aarch64-expat
            mingw-w64-clang-aarch64-libffi
            mingw-w64-clang-aarch64-libxml2
            diffutils
            make
            git
            perl

      - name: Build Qt statically from source (ARM64)
        if: needs.setup-env.outputs.qt-cache-hit != 'true'
        shell: msys2 {0}
        env:
          ARCH: arm64
          CC: /clangarm64/bin/clang
          CXX: /clangarm64/bin/clang++
          PATH: /clangarm64/bin:/usr/bin:/bin
        run: |
          echo "Building Qt 6.6.3 statically for ARM64..."
          ./build-script/build-static-qt-from-source.sh

      - name: Verify Qt build succeeded
        if: needs.setup-env.outputs.qt-cache-hit != 'true'
        shell: powershell
        run: |
          if (-not (Test-Path "${{ env.QT_PREFIX }}\lib\cmake\Qt6\Qt6Config.cmake")) {
            throw "Qt build failed - Qt6Config.cmake not found at ${{ env.QT_PREFIX }}"
          }
          if (-not (Test-Path "${{ env.QT_PREFIX }}\bin\lupdate.exe")) {
            throw "Qt build failed - lupdate.exe not found (qttools module missing)"
          }
          Write-Host "SUCCESS: Qt static build verified at ${{ env.QT_PREFIX }}"

      - name: Upload Qt artifact
        if: needs.setup-env.outputs.qt-cache-hit != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: qt-static-arm64
          path: ${{ env.QT_PREFIX }}
          retention-days: 1

      - name: Save Qt cache
        if: needs.setup-env.outputs.qt-cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ env.QT_PREFIX }}
          key: qt-6.6.3-msys2-clangarm64-windows-static-v1-${{ hashFiles('build-script/build-static-qt-from-source.sh') }}

  # ---------------------------------------------------------------------------
  # Job 3: build-ffmpeg
  # Builds FFmpeg statically from source for ARM64 using clang.
  # Skips NVIDIA/Intel hardware accel (ARM64 runners have no dGPU).
  # ---------------------------------------------------------------------------
  build-ffmpeg:
    name: Build FFmpeg (Static, ARM64)
    needs: setup-env
    runs-on: windows-11-arm
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSYS2 CLANGARM64
        uses: msys2/setup-msys2@v2
        with:
          msystem: CLANGARM64
          update: true
          install: |
            mingw-w64-clang-aarch64-clang
            mingw-w64-clang-aarch64-compiler-rt
            mingw-w64-clang-aarch64-cmake
            mingw-w64-clang-aarch64-make
            mingw-w64-clang-aarch64-nasm
            mingw-w64-clang-aarch64-pkgconf
            mingw-w64-clang-aarch64-zlib
            mingw-w64-clang-aarch64-bzip2
            mingw-w64-clang-aarch64-xz
            mingw-w64-clang-aarch64-openssl
            mingw-w64-clang-aarch64-libiconv
            mingw-w64-clang-aarch64-libb2
            mingw-w64-clang-aarch64-brotli
            mingw-w64-clang-aarch64-libjpeg-turbo
            mingw-w64-clang-aarch64-zstd
            diffutils
            make
            git
            wget

      - name: Build FFmpeg statically from source (ARM64)
        if: needs.setup-env.outputs.ffmpeg-cache-hit != 'true'
        shell: msys2 {0}
        env:
          ARCH: arm64
          CC: /clangarm64/bin/clang
          CXX: /clangarm64/bin/clang++
          PATH: /clangarm64/bin:/usr/bin:/bin
        run: |
          echo "Building FFmpeg statically for ARM64..."
          ./build-script/build-static-ffmpeg-windows.sh

      - name: Verify FFmpeg build succeeded
        if: needs.setup-env.outputs.ffmpeg-cache-hit != 'true'
        shell: powershell
        run: |
          if (-not (Test-Path "${{ env.FFMPEG_PREFIX }}\lib\libavcodec.a")) {
            throw "FFmpeg build failed - libavcodec.a not found at ${{ env.FFMPEG_PREFIX }}"
          }
          Write-Host "SUCCESS: FFmpeg static build verified at ${{ env.FFMPEG_PREFIX }}"

      - name: Upload FFmpeg artifact
        if: needs.setup-env.outputs.ffmpeg-cache-hit != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-static-arm64
          path: ${{ env.FFMPEG_PREFIX }}
          retention-days: 1

      - name: Save FFmpeg cache
        if: needs.setup-env.outputs.ffmpeg-cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ env.FFMPEG_PREFIX }}
          key: ffmpeg-static-msys2-clangarm64-windows-v1-${{ hashFiles('build-script/build-static-ffmpeg-windows.sh') }}

  # ---------------------------------------------------------------------------
  # Job 4: build-project
  # Downloads the Qt + FFmpeg artifacts, configures CMake with static linking,
  # builds the app, and produces a single portable .exe (no DLLs, no NSIS).
  # ---------------------------------------------------------------------------
  build-project:
    name: Build OpenterfaceQT (Static, ARM64)
    needs: [setup-env, build-qt, build-ffmpeg]
    runs-on: windows-11-arm
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup MSYS2 CLANGARM64 (app build deps)
        uses: msys2/setup-msys2@v2
        with:
          msystem: CLANGARM64
          update: true
          install: |
            mingw-w64-clang-aarch64-clang
            mingw-w64-clang-aarch64-compiler-rt
            mingw-w64-clang-aarch64-cmake
            mingw-w64-clang-aarch64-make
            mingw-w64-clang-aarch64-pkgconf
            mingw-w64-clang-aarch64-zlib
            mingw-w64-clang-aarch64-bzip2
            mingw-w64-clang-aarch64-xz
            mingw-w64-clang-aarch64-openssl
            mingw-w64-clang-aarch64-libiconv
            mingw-w64-clang-aarch64-libb2
            mingw-w64-clang-aarch64-brotli
            mingw-w64-clang-aarch64-libjpeg-turbo
            mingw-w64-clang-aarch64-libusb
            mingw-w64-clang-aarch64-pcre2
            mingw-w64-clang-aarch64-zstd
            mingw-w64-clang-aarch64-lz4
            diffutils
            make
            git

      - name: Download Qt artifact (from build-qt job, if ran this run)
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: qt-static-arm64
          path: C:\
          if-no-files-found: warn

      - name: Restore Qt cache (fallback when build-qt was skipped)
        id: restore-qt
        uses: actions/cache@v4
        with:
          path: ${{ env.QT_PREFIX }}
          key: qt-6.6.3-msys2-clangarm64-windows-static-v1-${{ hashFiles('build-script/build-static-qt-from-source.sh') }}

      - name: Download FFmpeg artifact (from build-ffmpeg job, if ran this run)
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: ffmpeg-static-arm64
          path: C:\
          if-no-files-found: warn

      - name: Restore FFmpeg cache (fallback when build-ffmpeg was skipped)
        id: restore-ffmpeg
        uses: actions/cache@v4
        with:
          path: ${{ env.FFMPEG_PREFIX }}
          key: ffmpeg-static-msys2-clangarm64-windows-v1-${{ hashFiles('build-script/build-static-ffmpeg-windows.sh') }}

      - name: Verify Qt + FFmpeg artifacts present
        shell: powershell
        run: |
          if (-not (Test-Path "${{ env.QT_PREFIX }}\lib\cmake\Qt6\Qt6Config.cmake")) {
            throw "Qt artifact missing at ${{ env.QT_PREFIX }} — build-qt job did not produce it"
          }
          if (-not (Test-Path "${{ env.FFMPEG_PREFIX }}\lib\libavcodec.a")) {
            throw "FFmpeg artifact missing at ${{ env.FFMPEG_PREFIX }} — build-ffmpeg job did not produce it"
          }
          Write-Host "Qt + FFmpeg artifacts verified"

      - name: Build the project (static)
        shell: msys2 {0}
        env:
          ARCH: arm64
          CC: /clangarm64/bin/clang
          CXX: /clangarm64/bin/clang++
          PATH: /clangarm64/bin:/usr/bin:/bin
        run: |
          echo "=== Verifying Qt + FFmpeg static libs ==="
          for lib in \
              /c/Qt6-arm64/lib/cmake/Qt6/Qt6Config.cmake \
              /c/Qt6-arm64/bin/lupdate.exe \
              /c/ffmpeg-static-arm64/lib/libavcodec.a \
              /c/ffmpeg-static-arm64/lib/libavformat.a \
              /c/ffmpeg-static-arm64/lib/libavutil.a \
              /c/ffmpeg-static-arm64/lib/libswscale.a \
              /c/ffmpeg-static-arm64/lib/libturbojpeg.a \
              /clangarm64/lib/libz.a \
              /clangarm64/lib/libzstd.a \
              /clangarm64/lib/libbz2.a; do
            if [ -f "$lib" ]; then
              echo "  OK: $lib"
            else
              echo "  MISSING: $lib"
              exit 1
            fi
          done

          echo "=== Configuring OpenterfaceQT (static, ARM64) ==="
          rm -rf build
          mkdir -p build && cd build

          SOURCE_DIR_MSYS="/$(echo '${{ github.workspace }}' | sed 's|\\|/|g' | sed 's|:||')"
          echo "Source dir: $SOURCE_DIR_MSYS"
          echo "Qt prefix: ${{ env.QT_PREFIX }}"
          echo "FFmpeg prefix: ${{ env.FFMPEG_PREFIX }}"

          cmake -G "MinGW Makefiles" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_SYSTEM_NAME=Windows \
            -DCMAKE_SYSTEM_PROCESSOR=ARM64 \
            -DCMAKE_C_COMPILER=/clangarm64/bin/clang \
            -DCMAKE_CXX_COMPILER=/clangarm64/bin/clang++ \
            -DCMAKE_MAKE_PROGRAM=/clangarm64/bin/mingw32-make \
            -DCMAKE_PREFIX_PATH="C:/Qt6-arm64;C:/ffmpeg-static-arm64" \
            -DFFMPEG_PREFIX=C:/ffmpeg-static-arm64 \
            -DUSE_SHARED_FFMPEG=OFF \
            -DQT_BUILD_PATH=C:/Qt6-arm64 \
            -DMINGW_ROOT=C:/msys64/clangarm64 \
            -DOPENTERFACE_BUILD_STATIC=ON \
            -DOPENTERFACE_ARCH=arm64 \
            -DHAVE_LIBJPEG_TURBO=ON \
            -DBUILD_SHARED_LIBS=OFF \
            -DSTATIC_LINKAGE=ON \
            -DCMAKE_EXE_LINKER_FLAGS="-static-libgcc -static-libstdc++ -L/clangarm64/lib -L/c/ffmpeg-static-arm64/lib -Wl,-Bstatic,-lzstd,-Bdynamic" \
            -DCMAKE_MODULE_LINKER_FLAGS="-Wl,-Bstatic" \
            -DTURBOJPEG_LIBRARY="/c/ffmpeg-static-arm64/lib/libturbojpeg.a" \
            -DZSTD_LIBRARY="/clangarm64/lib/libzstd.a" \
            -DZSTD_INCLUDE_DIR="/clangarm64/include" \
            -DBROTLI_DEC_LIBRARY="/clangarm64/lib/libbrotlidec.a" \
            -DBROTLI_ENC_LIBRARY="/clangarm64/lib/libbrotlienc.a" \
            -DBROTLI_COMMON_LIBRARY="/clangarm64/lib/libbrotlicommon.a" \
            "$SOURCE_DIR_MSYS"

          echo "=== Building ==="
          mingw32-make -j2

          if [ ! -f openterfaceQT.exe ]; then
            echo "ERROR: openterfaceQT.exe not produced"
            ls -la
            exit 1
          fi

          echo "Build succeeded. Verifying static linkage..."
          objdump -x openterfaceQT.exe | grep "DLL Name" | sort -u || true

      - name: Upload portable ARM64 executable
        uses: actions/upload-artifact@v4
        with:
          name: openterfaceQT_windows_arm64_portable
          path: build/openterfaceQT.exe
          if-no-files-found: error
          retention-days: 14
