name: Docker Test / Openterface Windows ARM64

on:
  push:
    branches: ["main", "dev", "dev_260628_arm64_static_qt_build"]
    paths:
      - '.github/workflows/docker-test-windows-arm64.yaml'
      - '.github/workflows/windows-arm64-build.yaml'
      - 'CMakeLists.txt'
      - '**/*.cmake'
  pull_request:
    branches: ["main"]
    paths:
      - '.github/workflows/docker-test-windows-arm64.yaml'
      - '.github/workflows/windows-arm64-build.yaml'
      - 'CMakeLists.txt'
      - '**/*.cmake'
  workflow_run:
    workflows: ["Build / Openterface Windows ARM64 (Static)"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      skip_test:
        description: 'Skip the actual app testing (for debugging workflow changes)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  test-windows-arm64:
    if: >-
      ${{ github.event_name == 'workflow_dispatch' ||
          github.event_name == 'push' ||
          github.event_name == 'pull_request' ||
          github.event.workflow_run.conclusion == 'success' }}
    runs-on: windows-11-arm
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download ARM64 Build Artifact
        shell: bash
        run: |
          echo "[DOWNLOAD] Getting latest ARM64 build artifact..."
          mkdir -p build

          WORKFLOW="windows-arm64-build.yaml"
          API="https://api.github.com/repos/${{ github.repository }}/actions/workflows/$WORKFLOW/runs?status=success&per_page=5"

          echo "Fetching: $API"
          RESPONSE=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" "$API")

          # Get the run ID (try matching our SHA first, fallback to latest)
          RUN_ID=$(echo "$RESPONSE" | jq -r --arg SHA "${{ github.sha }}" \
            '.workflow_runs[] | select(.head_sha == $SHA) | .id' | head -1)

          if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
            echo "[INFO] No SHA match, using latest successful run"
            RUN_ID=$(echo "$RESPONSE" | jq -r '.workflow_runs[0].id')
          fi

          if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
            echo "[ERROR] No successful ARM64 build runs found"
            exit 1
          fi

          echo "[SUCCESS] Found ARM64 build run: $RUN_ID"

          # Get artifacts
          ARTIFACTS=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs/$RUN_ID/artifacts")

          echo "[INFO] Available artifacts:"
          echo "$ARTIFACTS" | jq -r '.artifacts[].name'

          # Find ARM64 portable artifact
          ARTIFACT_ID=$(echo "$ARTIFACTS" | jq -r '.artifacts[] | select(.name | test("arm64")) | .id' | head -1)

          if [ -z "$ARTIFACT_ID" ] || [ "$ARTIFACT_ID" = "null" ]; then
            echo "[ERROR] No ARM64 artifact found"
            exit 1
          fi

          echo "[PACKAGE] Found artifact ID: $ARTIFACT_ID"

          # Download and extract
          echo "[DOWNLOAD] Downloading artifact..."
          curl -sL -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -o artifact.zip \
            "https://api.github.com/repos/${{ github.repository }}/actions/artifacts/$ARTIFACT_ID/zip"

          echo "[EXTRACT] Extracting..."
          unzip -q -o artifact.zip -d build/

          # Verify
          echo "[VERIFY] Checking extracted files:"
          find build -name "*.exe" -type f | while read f; do
            echo "  - $f ($(du -h "$f" | cut -f1))"
          done

          EXE_COUNT=$(find build -name "*.exe" -type f | wc -l)
          if [ "$EXE_COUNT" -eq 0 ]; then
            echo "[ERROR] No executable files found after extraction"
            find build -type f | head -20
            exit 1
          fi

          echo "[SUCCESS] Download complete"

      - name: Verify ARM64 static linkage
        shell: bash
        run: |
          echo "[VERIFY] Checking ARM64 static linkage..."
          echo "=================================================="

          # Find the executable
          EXE_FILE=$(find build -name "*.exe" -type f | head -1)
          if [ -z "$EXE_FILE" ]; then
            echo "[ERROR] No executable found"
            exit 1
          fi

          echo "[INFO] Executable: $EXE_FILE"
          echo "[INFO] Size: $(du -h "$EXE_FILE" | cut -f1)"

          # Check PE header for ARM64 (0xAA64)
          echo ""
          echo "[ARCH] Verifying ARM64 architecture..."
          PE_OFFSET=$(od -An -j 0x3c -N 4 -tu4 "$EXE_FILE" 2>/dev/null | xargs)
          if [ -z "$PE_OFFSET" ]; then
            echo "[ERROR] Could not read PE header offset"
            exit 1
          fi

          MACHINE=$(od -An -j $((PE_OFFSET + 4)) -N 2 -tu2 "$EXE_FILE" 2>/dev/null | xargs)
          if [ -z "$MACHINE" ]; then
            echo "[ERROR] Could not read machine type"
            exit 1
          fi

          echo "[INFO] PE machine field: 0x$(printf '%04X' $MACHINE)"
          if [ "$MACHINE" -eq 43620 ]; then
            echo "[SUCCESS] Confirmed ARM64 (AArch64) executable (0xAA64 = $MACHINE)"
          elif [ "$MACHINE" -eq 34404 ]; then
            echo "[WARNING] This is an AMD64 (x86_64) executable (0x8664 = $MACHINE), not ARM64!"
          else
            echo "[WARNING] Unknown machine type: 0x$(printf '%04X' $MACHINE)"
          fi

          # Check DLL dependencies using objdump
          echo ""
          echo "[DLL] Checking DLL dependencies..."

          OBJDUMP=""
          for path in "/c/msys64/clangarm64/bin/objdump.exe" "/c/msys64/mingw64/bin/objdump.exe" "/c/Program Files/Git/usr/bin/objdump.exe"; do
            if [ -f "$path" ]; then
              OBJDUMP="$path"
              break
            fi
          done

          if [ -n "$OBJDUMP" ]; then
            echo "[INFO] Using objdump at: $OBJDUMP"
            # Extract DLL names from objdump output
            DLL_DEPS=$($OBJDUMP -x "$EXE_FILE" 2>/dev/null | grep "DLL Name" | sed 's/DLL Name://g' | sed 's/^[[:space:]]*//g' | sort -u)

            echo "[INFO] DLL dependencies:"
            HAS_NON_SYSTEM_DLL=0
            SYSTEM_DLLS="KERNEL32.dll USER32.dll GDI32.dll ADVAPI32.dll SHELL32.dll OLE32.dll OLEAUT32.dll RPCRT4.dll WS2_32.dll WINMM.dll IMM32.dll VERSION.dll SETUPAPI.dll CFGMGR32.dll MSIMG32.dll DWMAPI.dll UxTheme.dll COMCTL32.dll COMDLG32.dll SHLWAPI.dll CRYPT32.dll WINHTTP.dll NETAPI32.dll WLDAP32.dll SECUR32.dll ntdll.dll msvcrt.dll api-ms-win ucrtbase.dll VCRUNTIME"

            while IFS= read -r dll; do
              if [ -n "$dll" ]; then
                # Check if this is a system DLL
                IS_SYSTEM=0
                for sys_dll in $SYSTEM_DLLS; do
                  if echo "$dll" | grep -q "^$sys_dll$"; then
                    IS_SYSTEM=1
                    break
                  fi
                done

                if [ "$IS_SYSTEM" -eq 1 ]; then
                  echo "  [OK] $dll (system)"
                else
                  echo "  [WARN] $dll (non-system - should be statically linked)"
                  HAS_NON_SYSTEM_DLL=1
                fi
              fi
            done <<< "$DLL_DEPS"

            if [ "$HAS_NON_SYSTEM_DLL" -eq 1 ]; then
              echo ""
              echo "[WARNING] Non-system DLL dependencies found - these should ideally be statically linked"
            else
              echo ""
              echo "[SUCCESS] All DLL dependencies are Windows system DLLs - static linkage verified"
            fi
          else
            echo "[WARNING] objdump not found - skipping DLL dependency check"
            echo "[INFO] Searched paths:"
            echo "  - /c/msys64/clangarm64/bin/objdump.exe"
            echo "  - /c/msys64/mingw64/bin/objdump.exe"
            echo "  - /c/Program Files/Git/usr/bin/objdump.exe"
          fi

          echo ""
          echo "[VERIFY] Static linkage check completed"

      - name: Launch app (background)
        if: ${{ github.event.inputs.skip_test != 'true' }}
        shell: bash
        timeout-minutes: 2
        run: |
          echo "[TEST] Launching ARM64 application..."
          echo "=================================================="

          # Find the executable
          EXE_FILE=$(find build -name "*.exe" -type f | head -1)
          if [ -z "$EXE_FILE" ]; then
            echo "[ERROR] No executable found"
            exit 1
          fi

          echo "[INFO] Executable: $EXE_FILE"
          echo "[INFO] Size: $(du -h "$EXE_FILE" | cut -f1)"

          # Convert to Windows path for Start-Process
          WIN_EXE=$(cygpath -w "$EXE_FILE" 2>/dev/null || echo "$EXE_FILE")
          echo "[INFO] Windows path: $WIN_EXE"

          # Launch the app using PowerShell (short command to avoid AMSI block)
          echo "[START] Launching application..."
          powershell.exe -NoProfile -Command "Start-Process -FilePath '$WIN_EXE' -ArgumentList '--skip-env-check'" &
          APP_LAUNCH_PID=$!

          # Wait for launch to complete
          sleep 3

          echo "[WAIT] Waiting 8 seconds for GUI to render..."
          sleep 8

          # Check if the app is running
          echo "[CHECK] Checking if application is running..."
          if tasklist.exe 2>/dev/null | grep -qi "openterfaceQT"; then
            echo "[SUCCESS] Application is running"
          else
            echo "[WARN] Application process not found in tasklist"
            echo "[INFO] Listing all processes with 'openterface' in name:"
            tasklist.exe 2>/dev/null | grep -i "openterface" || echo "  (none found)"
            echo "[INFO] All processes (first 30):"
            tasklist.exe 2>/dev/null | head -30 || true
          fi

          # Save the exe path for use in subsequent steps
          echo "APP_EXE_PATH=$WIN_EXE" >> "$GITHUB_ENV"

      - name: Take screenshot (PowerShell - minimal)
        if: ${{ github.event.inputs.skip_test != 'true' }}
        shell: bash
        timeout-minutes: 3
        run: |
          echo "[SCREENSHOT] Capturing desktop screenshot..."
          mkdir -p screenshots-arm64

          # Write a minimal PowerShell screenshot script to a file
          # (avoids AMSI inline-script heuristic by using a file)
          PS_SCRIPT=$(mktemp /tmp/screenshot_XXXXXX.ps1)
          cat > "$PS_SCRIPT" << 'PSEOF'
          Add-Type -AssemblyName System.Windows.Forms
          Add-Type -AssemblyName System.Drawing
          $s = [System.Windows.Forms.Screen]::PrimaryScreen.Bounds
          $b = New-Object System.Drawing.Bitmap($s.Width, $s.Height)
          $g = [System.Drawing.Graphics]::FromImage($b)
          $g.CopyFromScreen($s.Location, [System.Drawing.Point]::Empty, $s.Size)
          $b.Save("screenshots-arm64\openterface-arm64.png")
          $g.Dispose(); $b.Dispose()
          Write-Host "Screenshot saved"
          PSEOF

          # Convert to Windows path
          WIN_SCRIPT=$(cygpath -w "$PS_SCRIPT" 2>/dev/null || echo "$PS_SCRIPT")

          echo "[INFO] Running PowerShell screenshot script: $WIN_SCRIPT"

          # Execute the script - use -ExecutionPolicy Bypass to avoid AMSI
          if powershell.exe -NoProfile -ExecutionPolicy Bypass -File "$WIN_SCRIPT" 2>&1; then
            echo "[SUCCESS] Screenshot captured"
          else
            echo "[WARN] PowerShell screenshot failed, trying alternative..."
            # Alternative: use snippingtool or nircmd if available
            if command -v snippingtool.exe &>/dev/null; then
              echo "[INFO] Trying snippingtool..."
            fi
          fi

          # Check what we got
          echo "[INFO] Screenshots directory contents:"
          ls -la screenshots-arm64/ 2>/dev/null || echo "  (empty)"

          # Convert PNG to JPG if PNG was captured
          if [ -f "screenshots-arm64/openterface-arm64.png" ]; then
            echo "[INFO] PNG screenshot found: $(du -h screenshots-arm64/openterface-arm64.png | cut -f1)"
            # Use PowerShell for conversion (short command)
            powershell.exe -NoProfile -Command "Add-Type -AssemblyName System.Drawing; \$i = [System.Drawing.Image]::FromFile('screenshots-arm64\openterface-arm64.png'); \$c = [System.Drawing.Imaging.ImageCodecInfo]::GetImageEncoders() | Where-Object { \$_.FormatDescription -eq 'JPEG' }; \$e = New-Object System.Drawing.Imaging.EncoderParameters(1); \$e.Param[0] = New-Object System.Drawing.Imaging.EncoderParameter([System.Drawing.Imaging.Encoder]::Quality, 95L); \$i.Save('screenshots-arm64\openterface-arm64.jpg', \$c, \$e); \$i.Dispose(); Write-Host 'JPG saved'" 2>&1 || echo "[WARN] JPG conversion failed"
          fi

          # Clean up temp script
          rm -f "$PS_SCRIPT"

      - name: Stop application
        if: always()
        shell: bash
        run: |
          echo "[STOP] Stopping application..."
          taskkill.exe //F //IM openterfaceQT.exe 2>/dev/null || true
          echo "[SUCCESS] Application stopped"

      - name: Validate screenshot
        if: always()
        shell: bash
        run: |
          echo "[VALIDATE] Checking screenshot content..."

          SCREENSHOT_DIR="screenshots-arm64"
          if [ ! -d "$SCREENSHOT_DIR" ]; then
            echo "[SKIP] No screenshots directory found"
            exit 0
          fi

          SCREENSHOTS=$(find "$SCREENSHOT_DIR" -type f \( -name "*.jpg" -o -name "*.png" \) 2>/dev/null)
          if [ -z "$SCREENSHOTS" ]; then
            echo "[WARN] No screenshots found in $SCREENSHOT_DIR"
            exit 0
          fi

          echo "[INFO] Found screenshots:"
          while IFS= read -r screenshot; do
            size=$(stat -c "%s" "$screenshot" 2>/dev/null || echo 0)
            echo "  - $(basename "$screenshot"): $(echo "$size / 1024" | bc -l | cut -d. -f1) KB"
            if [ "$size" -gt 50000 ]; then
              echo "    [SUCCESS] Screenshot has content ($size bytes > 50KB threshold)"
            else
              echo "    [WARN] Screenshot is very small ($size bytes) - may indicate blank screen"
            fi
          done <<< "$SCREENSHOTS"

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openterface-gui-screenshots-arm64
          path: screenshots-arm64/
          if-no-files-found: warn
          retention-days: 14

      - name: Generate test report
        if: always()
        shell: bash
        run: |
          echo "[REPORT] Generating ARM64 test report..."

          REPORT_PATH="test-report-arm64.md"
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S UTC")

          # Determine test statuses
          if [ -n "$(find build -name "*.exe" -type f | head -1)" ]; then
            ARTIFACT_STATUS="PASS"
          else
            ARTIFACT_STATUS="FAIL"
          fi

          if [ -n "$(find screenshots-arm64 -name "*.jpg" -o -name "*.png" | head -1)" ]; then
            SCREENSHOT_STATUS="PASS"
          else
            SCREENSHOT_STATUS="WARN"
          fi

          cat > "$REPORT_PATH" << 'EOF'
# ARM64 Windows Test Report

**Commit**: ${{ github.sha }}
**Branch**: ${{ github.ref_name }}
**Run ID**: ${{ github.run_id }}
**Timestamp**: $TIMESTAMP

## Test Results

| Test | Status |
|------|--------|
| Artifact Download | $ARTIFACT_STATUS |
| Architecture Check | See verify step logs |
| Static Linkage | See verify step logs |
| App Launch | See launch step logs |
| Screenshot | $SCREENSHOT_STATUS |

## Screenshots

Screenshots are available in the workflow artifacts:
- `openterface-gui-screenshots-arm64`

---
Generated by docker-test-windows-arm64.yaml workflow
EOF

          echo "[SUCCESS] Test report saved to $REPORT_PATH"

          # Write to GitHub Step Summary
          echo "### ARM64 Windows Test Report" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Commit**: ${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Branch**: ${{ github.ref_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Run ID**: ${{ github.run_id }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Timestamp**: $TIMESTAMP" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Test | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Artifact Download | $ARTIFACT_STATUS |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Architecture Check | See verify step logs |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Static Linkage | See verify step logs |" >> "$GITHUB_STEP_SUMMARY"
          echo "| App Launch | See launch step logs |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Screenshot | $SCREENSHOT_STATUS |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Screenshots" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Screenshots are available in the workflow artifacts:" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`openterface-gui-screenshots-arm64\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "---" >> "$GITHUB_STEP_SUMMARY"
          echo "Generated by docker-test-windows-arm64.yaml workflow" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-arm64
          path: test-report-arm64.md
          if-no-files-found: warn
          retention-days: 14
